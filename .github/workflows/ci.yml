name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Code quality (fast gate, ~1 min) ─────────────────────────────────────
  quality:
    name: Quality (ruff + pre-commit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-quality-${{ hashFiles('requirements-dev.txt') }}

      - name: Install quality tools
        run: pip install ruff==0.9.6 mypy==1.14.1 pre-commit==4.0.1

      - name: Cache pre-commit envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: ruff lint
        run: ruff check src/ tests/ scripts/

      - name: ruff format check
        run: ruff format --check src/ tests/ scripts/

      - name: pre-commit (non-ruff hooks)

        env:
          SKIP: ruff,ruff-format
        run: pre-commit run --all-files

      - name: Type-check (mypy)
        run: mypy src/

  # ── 2. Tests + coverage (depends on quality) ─────────────────────────────────
  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-test-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: pip-test-

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        run: pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-audit-${{ hashFiles('requirements.txt') }}

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: Audit runtime dependencies
        run: |
          pip-audit -r requirements.txt --format=json -o audit-report.json --progress-spinner=off || true
          pip-audit -r requirements.txt --format=columns --progress-spinner=off \
            --ignore-vuln PYSEC-2025-52 \
            --ignore-vuln GHSA-wf7f-8fxf-xfxc \
            --ignore-vuln GHSA-pgqp-8h46-6x4j \
            --ignore-vuln GHSA-4x5p-f36r-mxxr \
            --ignore-vuln GHSA-w8v5-vhqr-4h9v \
            --ignore-vuln GHSA-cfh3-3jmp-rvhc

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-${{ github.run_id }}
          path: audit-report.json
          retention-days: 30
