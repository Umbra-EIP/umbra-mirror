name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Code quality (fast gate, ~1 min) ─────────────────────────────────────
  quality:
    name: Quality (ruff + pre-commit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-quality-${{ hashFiles('requirements-dev.txt') }}

      - name: Install quality tools
        run: pip install ruff==0.9.6 mypy==1.14.1 pre-commit==4.0.1

      - name: Cache pre-commit envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: ruff lint
        run: ruff check src/ tests/ scripts/

      - name: ruff format check
        run: ruff format --check src/ tests/ scripts/

      - name: pre-commit (non-ruff hooks)
        # ruff lint + format are already run explicitly above; skip them here to avoid duplication.
        # pre-commit run only accepts a single hook ID per invocation — use SKIP instead.
        env:
          SKIP: ruff,ruff-format
        run: pre-commit run --all-files

      - name: Type-check (mypy)
        run: mypy src/

  # ── 2. Tests + coverage (depends on quality) ─────────────────────────────────
  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-test-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: pip-test-

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        run: pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  # ── 3. Security audit (independent, non-blocking) ────────────────────────────
  # continue-on-error: true — some MLflow CVEs only have fixes in 3.x (breaking
  # upgrade), so we surface findings without blocking the test job. The JSON
  # report is uploaded as an artifact for review on every run.
  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-audit-${{ hashFiles('requirements.txt') }}

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: Audit runtime dependencies
        run: pip-audit -r requirements.txt --format=json -o audit-report.json; pip-audit -r requirements.txt --format=columns

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-${{ github.run_id }}
          path: audit-report.json
          retention-days: 30
