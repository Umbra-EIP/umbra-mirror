name: SonarCloud analysis

# Triggered automatically after the CI workflow completes successfully,
# reusing its uploaded coverage artifact instead of re-running tests.
# Can also be triggered manually (workflow_dispatch) with fresh coverage.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  pull-requests: read
  actions: read  # required to download artifacts from another workflow run

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    # Skip if triggered by a failed CI run (but always run on manual dispatch)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for blame / new-code detection
          # On workflow_run, check out the exact commit that CI tested
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # ── Coverage: reuse artifact from CI (normal path) ────────────────────
      - name: Download coverage artifact (from CI run)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # ── Coverage: generate fresh on manual dispatch ───────────────────────
      - uses: actions/setup-python@v5
        if: github.event_name == 'workflow_dispatch'
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (manual run)
        if: github.event_name == 'workflow_dispatch'
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Generate coverage (manual run)
        if: github.event_name == 'workflow_dispatch'
        run: pytest --cov=src --cov-report=xml:coverage.xml --no-header -q

      # ── SonarCloud analysis ───────────────────────────────────────────────
      - name: Analyze with SonarCloud
        uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Umbra-EIP_umbra-mirror
            -Dsonar.organization=umbra-eip
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.python.version=3.11
          projectBaseDir: .
